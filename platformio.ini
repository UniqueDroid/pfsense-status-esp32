[platformio]
default_envs = lilygo-t-display-s3

[env]
platform = espressif32@6.9.0
framework = arduino
monitor_speed = 115200
extra_scripts =
  pre:scripts/set_version.py

lib_deps =
  tzapu/WiFiManager @ ^2.0.17
  bblanchon/ArduinoJson @ ^7.1.0
  bodmer/TFT_eSPI @ ^2.5.43
  lvgl/lvgl @ ^8.3.11

build_flags =
  -D LV_CONF_INCLUDE_SIMPLE=1
  -D LV_CONF_PATH=${PROJECT_DIR}/include/lv_conf.h

[env:lilygo-t-display-s3]
board = lilygo-t-display-s3
build_src_filter =
  +<*>
  -<dashboard_about.cpp>
  -<dashboard_esp32info.cpp>
build_flags =
  ${env.build_flags}
  -D BOARD_PROFILE_LILYGO_T_DISPLAY_S3=1
  -D USE_LVGL_DASHBOARD=1
  -include ${PROJECT_DIR}/include/boards/lilygo_t_display_s3.h

[env:cyd-2432s028]
board = esp32dev
; Default OTA partition scheme only gives ~1.25MB per app slot, too small for
; this firmware; min_spiffs keeps two OTA slots but grows them to ~1.9MB.
board_build.partitions = min_spiffs.csv
build_src_filter =
  +<*>
  -<dashboard_about.cpp>
  -<dashboard_esp32info.cpp>
build_flags =
  ${env.build_flags}
  -D BOARD_PROFILE_CYD_2432S028=1
  -include ${PROJECT_DIR}/include/boards/cyd_2432s028.h
